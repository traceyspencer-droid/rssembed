<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BillCutter Feed Widget</title>
  <style>
    :root {
      --card: #ffffff;
      --text: #18322c;
      --muted: #5f7a73;
      --border: #d7e8e2;
      --accent-dark: #0d5a4c;
      --shadow: 0 10px 30px rgba(18, 113, 95, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
      background: transparent;
      color: var(--text);
    }

    .feed {
      display: grid;
      gap: 16px;
    }

    .item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .item:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(18, 113, 95, 0.12);
      border-color: #c5ddd5;
    }

    .item.has-thumb {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .thumb-wrap {
      display: block;
      width: 100%;
    }

    .thumb {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 14px;
      background: #eef4f1;
      border: 1px solid #e4efea;
    }

    .content {
      min-width: 0;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .title {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .title a {
      color: var(--text);
      text-decoration: none;
    }

    .title a:hover {
      color: var(--accent-dark);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .desc {
      font-size: 14px;
      line-height: 1.7;
      color: #39524c;
      margin: 0;
    }

    .empty,
    .error {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      font-size: 14px;
    }

    .error {
      color: #9b1c1c;
      border-color: #f0caca;
      background: #fff8f8;
    }

    @media (max-width: 640px) {
      .item {
        padding: 14px;
        border-radius: 14px;
      }

      .item.has-thumb {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .title {
        font-size: 16px;
      }

      .desc {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="feed" class="feed"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const rawLabel = (params.get('label') || '').trim();
    const label = rawLabel || '';
    const requestedLimit = parseInt(params.get('limit') || '10', 10);
    const limit = Math.min(Math.max(requestedLimit || 10, 1), 20);
    const blogBase = 'https://blog.billcutter.co.uk';
    const callbackName = 'renderBloggerFeed';
    const summaryLength = 320;
    const thumbWidth = 480;

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html || '';
      return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
    }

    function truncate(text, max) {
      if (!text || text.length <= max) return text || '';
      return text.substring(0, max).replace(/\s+\S*$/, '') + '...';
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      if (isNaN(date)) return '';
      return date.toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short',
        year: 'numeric'
      });
    }

    function getPostLink(entry) {
      if (!entry.link || !entry.link.length) return '#';
      const alt = entry.link.find(link => link.rel === 'alternate' && link.type === 'text/html');
      return alt ? alt.href : entry.link[0].href;
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getSummary(entry) {
      if (entry.content && entry.content.$t) {
        return truncate(stripHtml(entry.content.$t), summaryLength);
      }
      if (entry.summary && entry.summary.$t) {
        return truncate(stripHtml(entry.summary.$t), summaryLength);
      }
      return '';
    }

    function resizeBloggerThumb(url, width) {
      if (!url) return '';
      const height = Math.round(width * 0.625);

      return url
        .replace(/\/s72-c\//, `/w${width}-h${height}-p-k-no-nu/`)
        .replace(/=s72-c$/, `=w${width}-h${height}-p-k-no-nu`)
        .replace(/\/w72-h72-p-k-no-nu\//, `/w${width}-h${height}-p-k-no-nu/`)
        .replace(/=w72-h72-p-k-no-nu$/, `=w${width}-h${height}-p-k-no-nu`);
    }

    function getThumbnail(entry) {
      if (entry.media$thumbnail && entry.media$thumbnail.url) {
        return resizeBloggerThumb(entry.media$thumbnail.url, thumbWidth);
      }
      return '';
    }

    function renderBloggerFeed(data) {
      const container = document.getElementById('feed');
      const entries = (data.feed && data.feed.entry) ? data.feed.entry.slice(0, limit) : [];

      if (!entries.length) {
        container.innerHTML = '<div class="empty">No posts found for this feed.</div>';
        return;
      }

      container.innerHTML = entries.map(entry => {
        const title = entry.title ? entry.title.$t : 'Untitled';
        const link = getPostLink(entry);
        const published = entry.published ? formatDate(entry.published.$t) : '';
        const summary = getSummary(entry);
        const thumbnail = getThumbnail(entry);
        const hasThumb = !!thumbnail;

        return `
          <article class="item${hasThumb ? ' has-thumb' : ''}">
            ${hasThumb ? `
              <a class="thumb-wrap" href="${link}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(title)}">
                <img class="thumb" src="${thumbnail}" alt="" loading="lazy">
              </a>
            ` : ''}
            <div class="content">
              ${published ? `<div class="meta">${published}</div>` : ''}
              <h3 class="title">
                <a href="${link}" target="_blank" rel="noopener noreferrer">${escapeHtml(title)}</a>
              </h3>
              ${summary ? `<p class="desc">${escapeHtml(summary)}</p>` : ''}
            </div>
          </article>
        `;
      }).join('');
    }

    function showError() {
      document.getElementById('feed').innerHTML =
        '<div class="error">Could not load the feed right now.</div>';
    }

    const feedPath = label
      ? `/feeds/posts/default/-/${encodeURIComponent(label)}`
      : '/feeds/posts/default/';

    const script = document.createElement('script');
    script.src = `${blogBase}${feedPath}?alt=json-in-script&callback=${callbackName}&max-results=${limit}`;
    script.onerror = showError;
    document.body.appendChild(script);
  </script>
</body>
</html>
