<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BillCutter Feed Widget</title>
  <style>
    :root {
      --bg: #f5faf8;
      --card: #ffffff;
      --card-alt: #eef7f4;
      --text: #18322c;
      --muted: #5f7a73;
      --border: #d7e8e2;
      --accent: #12715f;
      --accent-dark: #0d5a4c;
      --accent-soft: #dff3ec;
      --shadow: 0 10px 30px rgba(18, 113, 95, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #f7fbfa 0%, #f3faf7 100%);
      color: var(--text);
    }

    .feed {
      display: grid;
      gap: 14px;
    }

    .item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 16px 14px;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .item:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(18, 113, 95, 0.12);
      border-color: #c5ddd5;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
    }

    .title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .title a {
      color: var(--text);
      text-decoration: none;
    }

    .title a:hover {
      color: var(--accent-dark);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .desc {
      font-size: 14px;
      line-height: 1.6;
      color: #39524c;
      margin: 0;
    }

    .empty,
    .error {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      font-size: 14px;
    }

    .error {
      color: #9b1c1c;
      border-color: #f0caca;
      background: #fff8f8;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .item {
        padding: 14px;
        border-radius: 14px;
      }

      .title {
        font-size: 16px;
      }

      .desc {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="feed" class="feed"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const rawLabel = (params.get('label') || '').trim();
    const label = rawLabel || '';
    const requestedLimit = parseInt(params.get('limit') || '10', 10);
    const limit = Math.min(Math.max(requestedLimit || 10, 1), 20);
    const blogBase = 'https://blog.billcutter.co.uk';
    const callbackName = 'renderBloggerFeed';

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html || '';
      return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
    }

    function truncate(text, max) {
      if (!text || text.length <= max) return text || '';
      return text.substring(0, max).replace(/\s+\S*$/, '') + '...';
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      if (isNaN(date)) return '';
      return date.toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short',
        year: 'numeric'
      });
    }

    function getPostLink(entry) {
      if (!entry.link || !entry.link.length) return '#';
      const alt = entry.link.find(link => link.rel === 'alternate' && link.type === 'text/html');
      return alt ? alt.href : entry.link[0].href;
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderBloggerFeed(data) {
      const container = document.getElementById('feed');
      const entries = (data.feed && data.feed.entry) ? data.feed.entry.slice(0, limit) : [];

      if (!entries.length) {
        container.innerHTML = '<div class="empty">No posts found for this feed.</div>';
        return;
      }

      const badgeText = label ? `Label: ${escapeHtml(label)}` : 'Latest posts';

      container.innerHTML = entries.map(entry => {
        const title = entry.title ? entry.title.$t : 'Untitled';
        const link = getPostLink(entry);
        const published = entry.published ? formatDate(entry.published.$t) : '';
        const summary = entry.summary
          ? truncate(stripHtml(entry.summary.$t), 180)
          : (entry.content ? truncate(stripHtml(entry.content.$t), 180) : '');

        return `
          <article class="item">
            <div class="meta-row">
              <span class="badge">${badgeText}</span>
              ${published ? `<span class="meta">${published}</span>` : ''}
            </div>
            <h3 class="title">
              <a href="${link}" target="_blank" rel="noopener noreferrer">${escapeHtml(title)}</a>
            </h3>
            ${summary ? `<p class="desc">${escapeHtml(summary)}</p>` : ''}
          </article>
        `;
      }).join('');
    }

    function showError() {
      document.getElementById('feed').innerHTML =
        '<div class="error">Could not load the feed right now.</div>';
    }

    const feedPath = label
      ? `/feeds/posts/default/-/${encodeURIComponent(label)}`
      : '/feeds/posts/default/';

    const script = document.createElement('script');
    script.src = `${blogBase}${feedPath}?alt=json-in-script&callback=${callbackName}&max-results=${limit}`;
    script.onerror = showError;
    document.body.appendChild(script);
  </script>
</body>
</html>
