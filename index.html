<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Billcutter RSS Widget</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #222;
    }
    .feed {
      display: grid;
      gap: 14px;
    }
    .item {
      border-bottom: 1px solid #ddd;
      padding-bottom: 12px;
    }
    .item:last-child {
      border-bottom: none;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 6px;
      line-height: 1.35;
    }
    .title a {
      color: #0b57d0;
      text-decoration: none;
    }
    .title a:hover {
      text-decoration: underline;
    }
    .meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }
    .desc {
      font-size: 14px;
      line-height: 1.5;
      color: #333;
    }
    .error {
      color: #b00020;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="feed" class="feed"></div>

<script>
  const params = new URLSearchParams(location.search);
  const rawLabel = (params.get('label') || '').trim();
  const label = rawLabel || '';
  const limit = Math.min(parseInt(params.get('limit') || '10', 10), 20);
  const blogBase = 'https://blog.billcutter.co.uk';
  const callbackName = 'renderBloggerFeed';

  function stripHtml(html) {
    const div = document.createElement('div');
    div.innerHTML = html || '';
    return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
  }

  function truncate(text, max) {
    if (!text || text.length <= max) return text || '';
    return text.substring(0, max).replace(/\s+\S*$/, '') + '...';
  }

  function formatDate(dateStr) {
    const date = new Date(dateStr);
    if (isNaN(date)) return '';
    return date.toLocaleDateString('en-GB', {
      day: 'numeric',
      month: 'short',
      year: 'numeric'
    });
  }

  function getPostLink(entry) {
    if (!entry.link || !entry.link.length) return '#';
    const alt = entry.link.find(l => l.rel === 'alternate' && l.type === 'text/html');
    return alt ? alt.href : entry.link[0].href;
  }

  function renderBloggerFeed(data) {
    const container = document.getElementById('feed');
    const entries = (data.feed && data.feed.entry) ? data.feed.entry.slice(0, limit) : [];

    if (!entries.length) {
      container.innerHTML = '<div class="error">No posts found.</div>';
      return;
    }

    container.innerHTML = entries.map(entry => {
      const title = entry.title ? entry.title.$t : 'Untitled';
      const link = getPostLink(entry);
      const published = entry.published ? formatDate(entry.published.$t) : '';
      const summary = entry.summary ? truncate(stripHtml(entry.summary.$t), 180) : '';

      return `
        <article class="item">
          <h3 class="title">
            <a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a>
          </h3>
          ${published ? `<div class="meta">${published}</div>` : ''}
          ${summary ? `<div class="desc">${summary}</div>` : ''}
        </article>
      `;
    }).join('');
  }

  function showError() {
    document.getElementById('feed').innerHTML =
      '<div class="error">Could not load the feed.</div>';
  }

  const feedPath = label
    ? `/feeds/posts/default/-/${encodeURIComponent(label)}`
    : '/feeds/posts/default/';

  const script = document.createElement('script');
  script.src = `${blogBase}${feedPath}?alt=json-in-script&callback=${callbackName}&max-results=${limit}`;
  script.onerror = showError;
  document.body.appendChild(script);
</script>
</body>
</html>
